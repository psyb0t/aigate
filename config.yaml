# ── MCP Servers ───────────────────────────────────────────────────────────────

mcp_servers:
  stealthy_auto_browse:
    url: "http://stealthy-auto-browse-proxy:8080/mcp/"
    transport: "http"
    auth_type: "bearer_token"
    auth_value: os.environ/STEALTHY_AUTO_BROWSE_AUTH_TOKEN
    description: "Stealth browser automation — navigate, click, type, screenshot, scrape. Passes all bot detectors."

  hybrids3:
    url: "http://hybrids3:8080/storage/mcp/"
    transport: "http"
    auth_type: "bearer_token"
    auth_value: os.environ/HYBRIDS3_UPLOADS_KEY
    description: "HybridS3 object storage — upload, fetch, list, and delete files/images. The uploads bucket is public-read; direct URLs work without signing."

  claudebox:
    url: "http://claudebox:8080/mcp/"
    transport: "http"
    auth_type: "bearer_token"
    auth_value: os.environ/CLAUDEBOX_API_TOKEN
    static_headers:
      Host: "localhost:8080"
    description: "Claude Code (OAuth/Max) — run agentic tasks, read/write workspace files. Tools: claude_run, read_file, write_file, list_files, delete_file."

  claudebox_zai:
    url: "http://claudebox-zai:8080/mcp/"
    transport: "http"
    auth_type: "bearer_token"
    auth_value: os.environ/CLAUDEBOX_ZAI_API_TOKEN
    static_headers:
      Host: "localhost:8080"
    description: "Claude Code (z.ai GLM) — run agentic tasks, read/write workspace files. Tools: claude_run, read_file, write_file, list_files, delete_file."


# ── Global Settings ───────────────────────────────────────────────────────────

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 600

  telemetry: false
  request_timeout: 600
  drop_params: true

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 600

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  timeout: 600
  retry_after: 5

  # Fallback chain: same-tier free alternatives first → other free providers → paid last
  fallbacks:

    # ── Anthropic (paid) → free alternatives → other paid ──────────────────────
