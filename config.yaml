# ── Model Groups (for load balancing / fallbacks) ────────────────────────────
model_group_alias:
  # Best available fast chat — falls back down the chain
  fast:
    - groq-llama-3.1-8b
    - cerebras-llama-3.1-8b
    - claude-code-haiku
    - claude-code-glm-4.5-air
    - or-gpt-oss-20b
    - hf-llama-3.1-8b
    - openai-gpt-4o-mini

  # Best available smart chat
  smart:
    - cerebras-qwen3-235b
    - claude-code-sonnet
    - or-hermes-3-405b
    - or-qwen3-80b
    - cerebras-gpt-oss-120b
    - or-nemotron-120b
    - or-minimax-m2.5
    - claude-code-glm-4.7
    - cerebras-glm-4.7
    - openai-gpt-4o
    - anthropic-claude-sonnet-4
    - claude-code-opus
    - claude-code-glm-5.1
    - groq-llama-3.3-70b

  # Best available vision
  vision:
    - openai-gpt-4o
    - anthropic-claude-sonnet-4
    - claude-code-sonnet
    - claude-code-glm-4.7
    - groq-llama-4-scout
    - hf-llama-4-scout
    - hf-qwen-vl-72b

  # Image generation
  image-gen:
    - openai-dall-e-3
    - hf-flux-schnell
    - hf-flux-dev

  # Transcription
  transcription:
    - groq-whisper-large-v3-turbo
    - groq-whisper-large-v3
    - openai-whisper


# ── Global Settings ───────────────────────────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 600

  telemetry: false
  request_timeout: 600
  drop_params: true

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 600

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  timeout: 600
  retry_after: 5
  # Fallback: if a model/group fails entirely, try these in order
  fallbacks:
    # Anthropic direct API → free alternatives first, paid last
    - anthropic-claude-opus-4:   [claude-code-opus, claude-code-glm-5.1]
    - anthropic-claude-sonnet-4: [claude-code-sonnet, claude-code-glm-4.7, openai-gpt-4o]
    - anthropic-claude-haiku-4:  [claude-code-haiku, claude-code-glm-4.5-air, openai-gpt-4o-mini]
    # claude-code (Max sub) → GLM free tier, then paid API
    - claude-code-opus:   [claude-code-glm-5.1, anthropic-claude-opus-4]
    - claude-code-sonnet: [claude-code-glm-4.7, anthropic-claude-sonnet-4, openai-gpt-4o]
    - claude-code-haiku:  [claude-code-glm-4.5-air, anthropic-claude-haiku-4, openai-gpt-4o-mini]
    # GLM (z.ai) → claude-code free, then paid API
    - claude-code-glm-5.1:     [claude-code-opus, anthropic-claude-opus-4]
    - claude-code-glm-4.7:     [claude-code-sonnet, anthropic-claude-sonnet-4, openai-gpt-4o]
    - claude-code-glm-4.5-air: [claude-code-haiku, anthropic-claude-haiku-4, openai-gpt-4o-mini]
    # OpenRouter → free alternatives on failure
    - or-hermes-3-405b: [claude-code-opus, claude-code-glm-5.1, anthropic-claude-opus-4]
    - or-qwen3-80b:     [claude-code-sonnet, claude-code-glm-4.7, openai-gpt-4o]
    - or-nemotron-120b: [cerebras-gpt-oss-120b, claude-code-sonnet, openai-gpt-4o]
    - or-minimax-m2.5:  [claude-code-sonnet, claude-code-glm-4.7, openai-gpt-4o]
    - or-llama-3.3-70b: [groq-llama-3.3-70b, claude-code-sonnet]
    - or-gpt-oss-120b:  [cerebras-gpt-oss-120b, groq-gpt-oss-120b, openai-gpt-4o]
    - or-gpt-oss-20b:   [groq-gpt-oss-20b, cerebras-llama-3.1-8b, openai-gpt-4o-mini]
    - or-qwen3-coder:   [claude-code-sonnet, cerebras-qwen3-235b]
    # Cerebras → free alternatives on failure
    - cerebras-qwen3-235b:   [claude-code-opus, claude-code-glm-5.1, anthropic-claude-opus-4]
    - cerebras-gpt-oss-120b: [claude-code-sonnet, claude-code-glm-4.7, openai-gpt-4o]
    - cerebras-glm-4.7:      [claude-code-glm-4.7, claude-code-sonnet, openai-gpt-4o]
    - cerebras-llama-3.1-8b: [groq-llama-3.1-8b, claude-code-haiku, openai-gpt-4o-mini]
    # Group-level: if whole group fails → models outside the group
    - fast:   [cerebras-llama-3.1-8b, claude-code-haiku, claude-code-glm-4.5-air, openai-gpt-4o-mini]
    - smart:  [cerebras-qwen3-235b, claude-code-sonnet, claude-code-glm-4.7, claude-code-opus, openai-gpt-4o]
    - vision: [claude-code-sonnet, claude-code-glm-4.7, openai-gpt-4o]
