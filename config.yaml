      api_key: os.environ/CLAUDE_CODE_API_TOKEN

  - model_name: claude-code-haiku
    litellm_params:
      model: openai/haiku
      api_base: http://claude-code:8080/openai/v1
      api_key: os.environ/CLAUDE_CODE_API_TOKEN

  # ── Cerebras ─────────────────────────────────────────────────────────────────
  # Free tier: 1M tokens/day, no credit card required

  - model_name: cerebras-qwen3-235b
    litellm_params:
      model: cerebras/qwen-3-235b-a22b-instruct-2507
      api_key: os.environ/CEREBRAS_API_KEY

  - model_name: cerebras-gpt-oss-120b
    litellm_params:
