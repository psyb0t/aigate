# ── Model Groups ──────────────────────────────────────────────────────────────

model_group_alias:

  # Best available fast model — free first, paid last
  fast:
    - groq-llama-3.1-8b
    - cerebras-llama-3.1-8b
    - claude-code-haiku
    - claude-code-glm-4.5-air
    - or-gpt-oss-20b
    - hf-llama-3.1-8b
    - openai-gpt-4o-mini

  # Best available smart model — free first, paid last
  smart:
    - cerebras-qwen3-235b
    - claude-code-sonnet
    - or-hermes-3-405b
    - or-qwen3-80b
    - cerebras-gpt-oss-120b
    - or-nemotron-120b
    - or-minimax-m2.5
    - claude-code-glm-4.7
    - cerebras-glm-4.7
    - openai-gpt-4o
    - anthropic-claude-sonnet-4
    - claude-code-opus
    - claude-code-glm-5.1
    - groq-llama-3.3-70b

  # Best available vision/multimodal model
  vision:
    - openai-gpt-4o
    - anthropic-claude-sonnet-4
    - claude-code-sonnet
    - claude-code-glm-4.7
    - groq-llama-4-scout
    - hf-llama-4-scout
    - hf-qwen-vl-72b

  # Image generation
  image-gen:
    - openai-dall-e-3
    - hf-flux-schnell
    - hf-flux-dev

  # Transcription
  transcription:
    - groq-whisper-large-v3-turbo
    - groq-whisper-large-v3
    - openai-whisper


# ── MCP Servers ───────────────────────────────────────────────────────────────

mcp_servers:
  stealthy_auto_browse:
    url: "http://stealthy-auto-browse-proxy:8080/mcp/"
    transport: "http"
    auth_type: "bearer_token"
    auth_value: os.environ/STEALTHY_AUTO_BROWSE_AUTH_TOKEN
    description: "Stealth browser automation — navigate, click, type, screenshot, scrape. Passes all bot detectors."

  hybrids3:
    url: "http://hybrids3:8080/storage/mcp/"
    transport: "http"
    auth_type: "bearer_token"
    auth_value: os.environ/HYBRIDS3_UPLOADS_KEY
    description: "HybridS3 object storage — upload, fetch, list, and delete files/images. The uploads bucket is public-read; direct URLs work without signing."


# ── Global Settings ───────────────────────────────────────────────────────────

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 600

  telemetry: false
  request_timeout: 600
  drop_params: true

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 600

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  timeout: 600
  retry_after: 5

  # Fallback chain: same-tier free alternatives first → other free providers → paid last
