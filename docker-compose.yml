services:
  nginx-auth-init:
    image: alpine:3.21
    restart: "no"
    mem_limit: ${NGINX_AUTH_INIT_MEM_LIMIT:-64m}
    memswap_limit: ${NGINX_AUTH_INIT_MEMSWAP_LIMIT:-128m}
    cpus: ${NGINX_AUTH_INIT_CPUS:-0.2}
    command:
      - sh
      - -c
      - |
        if [ -n "$$LITELLM_UI_BASIC_AUTH" ]; then
          apk add -q --no-cache openssl
          user="$${LITELLM_UI_BASIC_AUTH%%:*}"
          pass="$${LITELLM_UI_BASIC_AUTH#*:}"
          printf '%s:%s\n' "$$user" "$$(openssl passwd -apr1 "$$pass")" > /htpasswd/admin.htpasswd
          printf 'auth_basic "LiteLLM Admin";\nauth_basic_user_file /etc/nginx/auth/admin.htpasswd;\n' > /htpasswd/auth.conf
        else
          printf 'auth_basic off;\n' > /htpasswd/auth.conf
        fi
    environment:
      LITELLM_UI_BASIC_AUTH: ${LITELLM_UI_BASIC_AUTH:-}
    volumes:
      - ./.data/nginx:/htpasswd

  nginx:
    image: nginx:1.27.5-alpine
    restart: unless-stopped
    mem_limit: ${NGINX_MEM_LIMIT:-128m}
    memswap_limit: ${NGINX_MEMSWAP_LIMIT:-256m}
    cpus: ${NGINX_CPUS:-0.5}
    ports:
      - "4000:4000"
    volumes:
      - ./.data/nginx:/etc/nginx/auth:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
      - source: nginx_limits_conf
        target: /etc/nginx/conf.d/00-limits.conf
    depends_on:
      nginx-auth-init:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
      hybrids3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal
      - litellm-public

  litellm:
    build: .
    restart: unless-stopped
    cpus: ${LITELLM_CPUS:-4.0}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "${LITELLM_WORKERS:-4}"]
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      # Disable telemetry
      LITELLM_TELEMETRY: "False"
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      UI_USERNAME: ${LITELLM_USERNAME:-}
      UI_PASSWORD: ${LITELLM_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal
      - litellm-public

  claudebox:
    profiles: ["claudebox"]
    image: psyb0t/claudebox:v1.2.0-minimal
    restart: unless-stopped
    mem_limit: ${CLAUDEBOX_MEM_LIMIT:-1g}
    memswap_limit: ${CLAUDEBOX_MEMSWAP_LIMIT:-2g}
    cpus: ${CLAUDEBOX_CPUS:-2.0}
    environment:
      CLAUDE_MODE_API: "1"
      CLAUDE_MODE_API_PORT: "8080"
      CLAUDE_MODE_API_TOKEN: ${CLAUDEBOX_API_TOKEN:-lulz-4-security}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${CLAUDEBOX_ANTHROPIC_API_KEY:-}
    volumes:
      - ./.data/claudebox/config:/home/claude/.claude
      - ./.data/claudebox/workspaces:/workspaces
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - litellm-internal
      - litellm-public

  claudebox-zai:
    profiles: ["claudebox-zai"]
    image: psyb0t/claudebox:v1.2.0-minimal
    restart: unless-stopped
    mem_limit: ${CLAUDEBOX_ZAI_MEM_LIMIT:-1g}
    memswap_limit: ${CLAUDEBOX_ZAI_MEMSWAP_LIMIT:-2g}
    cpus: ${CLAUDEBOX_ZAI_CPUS:-2.0}
    environment:
      CLAUDE_MODE_API: "1"
      CLAUDE_MODE_API_PORT: "8080"
      CLAUDE_MODE_API_TOKEN: ${CLAUDEBOX_ZAI_API_TOKEN:-lulz-4-security-zai}
      ANTHROPIC_AUTH_TOKEN: ${ZAI_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
      API_TIMEOUT_MS: "3000000"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ZAI_OPUS_MODEL:-glm-5.1}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ZAI_SONNET_MODEL:-glm-4.7}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ZAI_HAIKU_MODEL:-glm-4.5-air}
    volumes:
      - ./.data/claudebox-zai/config:/home/claude/.claude
      - ./.data/claudebox-zai/workspaces:/workspaces
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - litellm-internal
      - litellm-public

  hybrids3:
    image: psyb0t/hybrids3:v0.1.0
    restart: unless-stopped
    mem_limit: ${HYBRIDS3_MEM_LIMIT:-256m}
    memswap_limit: ${HYBRIDS3_MEMSWAP_LIMIT:-512m}
    cpus: ${HYBRIDS3_CPUS:-0.5}
    volumes:
      - ./.data/hybrids3:/data
    configs:
      - source: hybrids3_config
        target: /config/config.yaml
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/storage/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  redis:
    image: redis:7.4.8-alpine
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    memswap_limit: ${REDIS_MEMSWAP_LIMIT:-512m}
    cpus: ${REDIS_CPUS:-0.3}
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  postgres:
    image: postgres:16.13-alpine
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-512m}
    memswap_limit: ${POSTGRES_MEMSWAP_LIMIT:-1g}
    cpus: ${POSTGRES_CPUS:-1.0}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./.data/postgres:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  # ── Stealthy Auto Browse cluster ─────────────────────────────────────────────

  stealthy-auto-browse-redis:
    image: redis:7.4.8-alpine
    restart: unless-stopped
    mem_limit: ${SAB_REDIS_MEM_LIMIT:-128m}
    memswap_limit: ${SAB_REDIS_MEMSWAP_LIMIT:-256m}
    cpus: ${SAB_REDIS_CPUS:-0.2}
    command: redis-server --appendonly yes --requirepass ${STEALTHY_AUTO_BROWSE_REDIS_PASSWORD}
    volumes:
      - ./.data/stealthy-auto-browse-redis:/data
    security_opt:
      - no-new-privileges:true
    networks:
      - stealthy-auto-browse

  stealthy-auto-browse:
    image: psyb0t/stealthy-auto-browse:v0.21.0
    scale: ${STEALTHY_AUTO_BROWSE_NUM_REPLICAS:-5}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${STEALTHY_AUTO_BROWSE_REDIS_PASSWORD}@stealthy-auto-browse-redis:6379
      AUTH_TOKEN: ${STEALTHY_AUTO_BROWSE_AUTH_TOKEN:-}
    mem_limit: ${SAB_MEM_LIMIT:-256m}
    memswap_limit: ${SAB_MEMSWAP_LIMIT:-512m}
    cpus: ${SAB_CPUS:-1.0}
    dns_search: ["."]
    depends_on:
      - stealthy-auto-browse-redis
    security_opt:
      - no-new-privileges:true
    networks:
      - stealthy-auto-browse

  stealthy-auto-browse-proxy:
    image: haproxy:3.2.15-alpine
    restart: unless-stopped
    mem_limit: ${SAB_PROXY_MEM_LIMIT:-128m}
    memswap_limit: ${SAB_PROXY_MEMSWAP_LIMIT:-256m}
    cpus: ${SAB_PROXY_CPUS:-0.3}
    user: root
    command: >-
      sh -c 'mkdir -p /var/run/haproxy &&
      haproxy -f /etc/haproxy/haproxy.cfg'
    configs:
      - source: haproxy_cfg
        target: /etc/haproxy/haproxy.cfg
    depends_on:
      - stealthy-auto-browse
    security_opt:
      - no-new-privileges:true
    networks:
      - stealthy-auto-browse
      - litellm-internal

  # ── Speaches (local transcription — faster-whisper + Parakeet TDT) ──────────

  speaches:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cpu
    restart: unless-stopped
    mem_limit: ${SPEACHES_MEM_LIMIT:-4g}
    memswap_limit: ${SPEACHES_MEMSWAP_LIMIT:-8g}
    cpus: ${SPEACHES_CPUS:-4.0}
    environment:
      WHISPER__MODEL: Systran/faster-distil-whisper-large-v3
      WHISPER__INFERENCE_DEVICE: cpu
      WHISPER__COMPUTE_TYPE: int8
    volumes:
      - ./.data/speaches:/home/ubuntu/.cache/huggingface/hub
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  # ── Ollama (local inference) ─────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:0.20.7
    restart: unless-stopped
    mem_limit: ${OLLAMA_MEM_LIMIT:-6g}
    memswap_limit: ${OLLAMA_MEMSWAP_LIMIT:-12g}
    cpus: ${OLLAMA_CPUS:-4.0}
    volumes:
      - ./.data/ollama:/root/.ollama
    networks:
      - litellm-internal
      - litellm-public

  ollama-pull:
    image: ollama/ollama:0.20.7
    restart: on-failure
    mem_limit: ${OLLAMA_PULL_MEM_LIMIT:-512m}
    memswap_limit: ${OLLAMA_PULL_MEMSWAP_LIMIT:-1g}
    cpus: ${OLLAMA_PULL_CPUS:-0.5}
    network_mode: "service:ollama"
    entrypoint: >
      sh -c '
        until ollama list > /dev/null 2>&1; do sleep 2; done;
        pull() { for i in 1 2 3 4 5; do ollama pull "$$1" && return 0; sleep 5; done; return 1; };
        pull nomic-embed-text &&
        pull bge-m3 &&
        pull qwen3-embedding:0.6b &&
        pull llama3.2:3b &&
        pull qwen3:4b &&
        pull smollm2:1.7b &&
        pull qwen2.5-coder:1.5b &&
        pull qwen2.5-coder:3b &&
        pull phi3.5 &&
        pull moondream
      '
    environment:
      - OLLAMA_HOST=http://localhost:11434
    depends_on:
      - ollama

  cloudflared:
    profiles: ["cloudflared"]
    build: ./cloudflared
    restart: unless-stopped
    mem_limit: ${CLOUDFLARED_MEM_LIMIT:-128m}
    memswap_limit: ${CLOUDFLARED_MEMSWAP_LIMIT:-256m}
    cpus: ${CLOUDFLARED_CPUS:-0.2}
    volumes:
      - ${CLOUDFLARED_CONFIG:-/dev/null}:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDS:-/dev/null}:/etc/cloudflared/creds.json:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-public

configs:
  nginx_conf:
    content: |
      server {
          listen 4000;
          absolute_redirect off;

          client_max_body_size 50m;

          # litellm admin UI + login — rate limited, optional basic auth
          location /ui {
              limit_req zone=admin burst=5 nodelay;
              include /etc/nginx/auth/auth.conf;
              proxy_pass http://litellm:4000/ui;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 60s;
              proxy_send_timeout 60s;
              proxy_buffering off;
              proxy_cache off;
          }

          location /login {
              limit_req zone=admin burst=5 nodelay;
              include /etc/nginx/auth/auth.conf;
              proxy_pass http://litellm:4000/login;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }

          # claudebox (OAuth) — full API access
          location /claudebox/ {
              proxy_pass http://claudebox:8080/;
              proxy_set_header Host localhost:8080;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 600s;
              proxy_send_timeout 600s;
              proxy_buffering off;
              proxy_cache off;
          }

          # claudebox-zai (GLM models) — full API access
          location /claudebox-zai/ {
              proxy_pass http://claudebox-zai:8080/;
              proxy_set_header Host localhost:8080;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 600s;
              proxy_send_timeout 600s;
              proxy_buffering off;
              proxy_cache off;
          }

          # stealthy-auto-browse cluster — HAProxy → browser replicas
          location /stealthy-auto-browse/ {
              proxy_pass http://stealthy-auto-browse-proxy:8080/;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 600s;
              proxy_send_timeout 600s;
              proxy_buffering off;
              proxy_cache off;
          }

          # hybrids3 — S3-compatible + plain HTTP + MCP
          location /storage {
              proxy_pass http://hybrids3:8080;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_buffering off;
              proxy_request_buffering off;
          }

          # everything else — LiteLLM
          location / {
              proxy_pass http://litellm:4000;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 600s;
              proxy_send_timeout 600s;
              proxy_buffering off;
              proxy_cache off;
          }
      }

  haproxy_cfg:
    content: |
      global
          log stdout format raw local0 info
          stats socket /var/run/haproxy/admin.sock mode 660 level admin expose-fd listeners

      defaults
          mode http
          log global
          option httplog
          timeout connect 5s
          timeout client 10m
          timeout server 10m

      resolvers docker
          nameserver dns 127.0.0.11:53
          hold valid 10s
          hold refused 5s
          accepted_payload_size 8192

      frontend main
          bind *:8080
          capture cookie INSTANCEID len 64
          http-request return status 200 content-type "application/json" string '{"status":"ok"}' if { path /__queue/health }
          http-request return status 200 content-type "application/json" string '{"status":"ok","num_replicas":${STEALTHY_AUTO_BROWSE_NUM_REPLICAS:-5}}' if { path /__queue/status }
          use_backend mcp if { path_beg /mcp }
          default_backend browsers

      backend mcp
          balance leastconn
          timeout queue ${STEALTHY_AUTO_BROWSE_QUEUE_TIMEOUT:-300}s
          stick-table type string len 64 size 200 expire 1h
          stick match req.hdr(Mcp-Session-Id)
          stick store-response res.hdr(Mcp-Session-Id)
          server-template sab ${STEALTHY_AUTO_BROWSE_NUM_REPLICAS:-5} stealthy-auto-browse:8080 resolvers docker check

      backend browsers
          balance leastconn
          timeout queue ${STEALTHY_AUTO_BROWSE_QUEUE_TIMEOUT:-300}s
          stick-table type string len 64 size 200 expire 1h
          stick match req.cook(INSTANCEID)
          stick store-response srv_name
          http-response add-header Set-Cookie "INSTANCEID=%[srv_name]; path=/"
          server-template sab ${STEALTHY_AUTO_BROWSE_NUM_REPLICAS:-5} stealthy-auto-browse:8080 resolvers docker check maxconn 1

      listen stats
          bind *:8081
          stats enable
          stats uri /
          stats refresh 10s

  nginx_limits_conf:
    content: |
      limit_req_zone $$binary_remote_addr zone=admin:10m rate=5r/m;

  hybrids3_config:
    content: |
      master_key: "${HYBRIDS3_MASTER_KEY}"
      master_public_key: "master"
      cleanup_interval: 1m
      lock_acquire_timeout: 30
      lock_hold_timeout: 300
      lock_max_waiters: 100
      path_prefix: /storage
      buckets:
        uploads:
          public: true
          key: "${HYBRIDS3_UPLOADS_KEY}"
          public_key: "uploads"
          ttl: "${HYBRIDS3_UPLOADS_TTL:-168h}"
          max_file_size: "${HYBRIDS3_UPLOADS_MAX_SIZE:-100MB}"

networks:
  litellm-internal:
    internal: true
  litellm-public:
  stealthy-auto-browse:
