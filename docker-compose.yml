services:
  nginx:
    image: nginx:1.27-alpine
    container_name: litellm-nginx
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      litellm:
        condition: service_healthy
      hybrids3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal
      - litellm-public

  litellm:
    build: .
    image: litellm-local:latest
    container_name: litellm
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      # Tune workers to your core count
      WORKERS: ${WORKERS:-8}
      # Disable telemetry
      LITELLM_TELEMETRY: "False"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      claude-code:
        condition: service_healthy
      claude-code-zai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal
      - litellm-public

  claude-code:
    image: psyb0t/claude-code:v0.38.0-minimal
    container_name: litellm-claude-code
    restart: unless-stopped
    environment:
      CLAUDE_MODE_API: "1"
      CLAUDE_MODE_API_PORT: "8080"
      CLAUDE_MODE_API_TOKEN: ${CLAUDE_CODE_API_TOKEN:-lulz-4-security}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
    volumes:
      - ./.data/claude-code/config:/home/claude/.claude
      - ./.data/claude-code/workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - litellm-internal
      - litellm-public

  claude-code-zai:
    image: psyb0t/claude-code:v0.38.0-minimal
    container_name: litellm-claude-code-zai
    restart: unless-stopped
    environment:
      CLAUDE_MODE_API: "1"
      CLAUDE_MODE_API_PORT: "8080"
      CLAUDE_MODE_API_TOKEN: ${CLAUDE_CODE_ZAI_API_TOKEN:-lulz-4-security-zai}
      ANTHROPIC_AUTH_TOKEN: ${ZAI_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
      API_TIMEOUT_MS: "3000000"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ZAI_OPUS_MODEL:-glm-5.1}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ZAI_SONNET_MODEL:-glm-4.7}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ZAI_HAIKU_MODEL:-glm-4.5-air}
    volumes:
      - ./.data/claude-code-zai/config:/home/claude/.claude
      - ./.data/claude-code-zai/workspaces:/workspaces
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - litellm-internal
      - litellm-public

  hybrids3:
    image: psyb0t/hybrids3:latest
    container_name: litellm-hybrids3
    restart: unless-stopped
    volumes:
      - ./.data/hybrids3:/data
    configs:
      - source: hybrids3_config
        target: /config/config.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/storage/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  redis:
    image: redis:7.4.8-alpine
    container_name: litellm-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  postgres:
    image: postgres:16.13-alpine
    container_name: litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

configs:
  hybrids3_config:
    content: |
      master_key: "${HYBRIDS3_MASTER_KEY}"
      master_public_key: "master"
      cleanup_interval: 1m
      lock_acquire_timeout: 30
      lock_hold_timeout: 300
      lock_max_waiters: 100
      path_prefix: /storage
      buckets:
        uploads:
          public: true
          key: "${HYBRIDS3_UPLOADS_KEY}"
          public_key: "uploads"
          ttl: "${HYBRIDS3_UPLOADS_TTL:-168h}"
          max_file_size: "${HYBRIDS3_UPLOADS_MAX_SIZE:-100MB}"

networks:
  litellm-internal:
    internal: true
  litellm-public:
