services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      litellm:
        condition: service_healthy
      hybrids3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal
      - litellm-public

  litellm:
    build: .
    image: litellm-local:latest
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      # Tune workers to your core count
      WORKERS: ${WORKERS:-8}
      # Disable telemetry
      LITELLM_TELEMETRY: "False"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      claude-code:
        condition: service_healthy
      claude-code-zai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal
      - litellm-public

  claude-code:
    image: psyb0t/claude-code:v0.38.0-minimal
    restart: unless-stopped
    environment:
      CLAUDE_MODE_API: "1"
      CLAUDE_MODE_API_PORT: "8080"
      CLAUDE_MODE_API_TOKEN: ${CLAUDE_CODE_API_TOKEN:-lulz-4-security}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
    volumes:
      - ./.data/claude-code/config:/home/claude/.claude
      - ./.data/claude-code/workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - litellm-internal
      - litellm-public

  claude-code-zai:
    image: psyb0t/claude-code:v0.38.0-minimal
    restart: unless-stopped
    environment:
      CLAUDE_MODE_API: "1"
      CLAUDE_MODE_API_PORT: "8080"
      CLAUDE_MODE_API_TOKEN: ${CLAUDE_CODE_ZAI_API_TOKEN:-lulz-4-security-zai}
      ANTHROPIC_AUTH_TOKEN: ${ZAI_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
      API_TIMEOUT_MS: "3000000"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ZAI_OPUS_MODEL:-glm-5.1}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ZAI_SONNET_MODEL:-glm-4.7}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ZAI_HAIKU_MODEL:-glm-4.5-air}
    volumes:
      - ./.data/claude-code-zai/config:/home/claude/.claude
      - ./.data/claude-code-zai/workspaces:/workspaces
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - litellm-internal
      - litellm-public

  hybrids3:
    image: psyb0t/hybrids3:latest
    restart: unless-stopped
    volumes:
      - ./.data/hybrids3:/data
    configs:
      - source: hybrids3_config
        target: /config/config.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/storage/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  redis:
    image: redis:7.4.8-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  postgres:
    image: postgres:16.13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - litellm-internal

  # ── Stealthy Auto Browse cluster ─────────────────────────────────────────────

  stealthy-auto-browse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./.data/stealthy-auto-browse-redis:/data
    security_opt:
      - no-new-privileges:true
    networks:
      - stealthy-auto-browse

  stealthy-auto-browse:
    image: psyb0t/stealthy-auto-browse:latest
    scale: ${STEALTHY_AUTO_BROWSE_NUM_REPLICAS:-5}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://stealthy-auto-browse-redis:6379
      AUTH_TOKEN: ${STEALTHY_AUTO_BROWSE_AUTH_TOKEN:-}
    mem_limit: 256m
    memswap_limit: 1280m
    dns_search: ["."]
    depends_on:
      - stealthy-auto-browse-redis
    security_opt:
      - no-new-privileges:true
    networks:
      - stealthy-auto-browse

  stealthy-auto-browse-proxy:
    image: haproxy:lts-alpine
    restart: unless-stopped
    user: root
    command: >-
      sh -c 'mkdir -p /var/run/haproxy &&
      haproxy -f /etc/haproxy/haproxy.cfg'
    configs:
      - source: haproxy_cfg
        target: /etc/haproxy/haproxy.cfg
    depends_on:
      - stealthy-auto-browse
    security_opt:
      - no-new-privileges:true
    networks:
      - stealthy-auto-browse
      - litellm-internal

configs:
  haproxy_cfg:
    content: |
      global
          log stdout format raw local0 info
          stats socket /var/run/haproxy/admin.sock mode 660 level admin expose-fd listeners

      defaults
          mode http
          log global
          option httplog
          timeout connect 5s
          timeout client 10m
          timeout server 10m

      resolvers docker
          nameserver dns 127.0.0.11:53
          hold valid 10s
          hold refused 5s
          accepted_payload_size 8192

      frontend main
          bind *:8080
          capture cookie INSTANCEID len 64
          http-request return status 200 content-type "application/json" string '{"status":"ok"}' if { path /__queue/health }
          http-request return status 200 content-type "application/json" string '{"status":"ok","num_replicas":${STEALTHY_AUTO_BROWSE_NUM_REPLICAS:-5}}' if { path /__queue/status }
          use_backend mcp if { path_beg /mcp }
          default_backend browsers

      backend mcp
          balance leastconn
          timeout queue ${STEALTHY_AUTO_BROWSE_QUEUE_TIMEOUT:-300}s
          stick-table type string len 64 size 200 expire 1h
          stick match req.hdr(Mcp-Session-Id)
          stick store-response res.hdr(Mcp-Session-Id)
          server-template sab ${STEALTHY_AUTO_BROWSE_NUM_REPLICAS:-5} stealthy-auto-browse:8080 resolvers docker check

      backend browsers
          balance leastconn
          timeout queue ${STEALTHY_AUTO_BROWSE_QUEUE_TIMEOUT:-300}s
          stick-table type string len 64 size 200 expire 1h
          stick match req.cook(INSTANCEID)
          stick store-response srv_name
          http-response add-header Set-Cookie "INSTANCEID=%[srv_name]; path=/"
          server-template sab ${STEALTHY_AUTO_BROWSE_NUM_REPLICAS:-5} stealthy-auto-browse:8080 resolvers docker check maxconn 1

      listen stats
          bind *:8081
          stats enable
          stats uri /
          stats refresh 10s

  hybrids3_config:
    content: |
      master_key: "${HYBRIDS3_MASTER_KEY}"
      master_public_key: "master"
      cleanup_interval: 1m
      lock_acquire_timeout: 30
      lock_hold_timeout: 300
      lock_max_waiters: 100
      path_prefix: /storage
      buckets:
        uploads:
          public: true
          key: "${HYBRIDS3_UPLOADS_KEY}"
          public_key: "uploads"
          ttl: "${HYBRIDS3_UPLOADS_TTL:-168h}"
          max_file_size: "${HYBRIDS3_UPLOADS_MAX_SIZE:-100MB}"

networks:
  litellm-internal:
    internal: true
  litellm-public:
  stealthy-auto-browse:
