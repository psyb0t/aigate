hybrids3:
  url: "http://hybrids3:8080/storage/mcp/"
  transport: "http"
  auth_type: "bearer_token"
  auth_value: os.environ/HYBRIDS3_UPLOADS_KEY
  description: "HybridS3 object storage — upload, fetch, list, and delete files/images. The uploads bucket is public-read; direct URLs work without signing."
