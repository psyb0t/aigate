general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 600

  telemetry: false
  request_timeout: 600
  drop_params: true

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 600
  enable_json_schema_validation: true
  callbacks: ["callbacks.resource_manager.proxy_handler_instance"]

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  timeout: 600
  retry_after: 5
